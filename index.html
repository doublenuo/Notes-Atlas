<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1.0, shrink-to-fit=no, viewport-fit=cover"
    />
    <title>Notes-Atlas</title>
    <link rel="icon" sizes="16x16" href="./static/images/logo.svg" />
    <meta
      name="description"
      content="A simple and elegant documentation site for projects."
    />

    <link
      rel="stylesheet"
      media="(prefers-color-scheme: dark)"
      href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css"
    />
    <link
      rel="stylesheet"
      media="(prefers-color-scheme: light)"
      href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/docsify-breadcrumb@latest/dist/breadcrumb.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/pseudocode@latest/build/pseudocode.min.css"
    />
    <link rel="stylesheet" href="static/css/custom.css" />
  </head>
  <body>
    <div id="app"></div>

    <script>
      window.$docsify = {
        repo: "doublenuo/Notes-Atlas",
        name: "Notes-Atlas",
        nameLink: "/",
        loadSidebar: true,
        loadNavbar: "navbar.md",
        coverpage: "cover.md",
        homepage: "README.md",
        notFoundPage: "404.md",
        alias: {
          "/.*/sidebar.md": "/sidebar.md",
        },
        auto2top: true,
        maxLevel: 4,
        subMaxLevel: 3,
        mergeNavbar: true,
        externalLinkRel: "_blank",
        routerMode: "history",
        crossOriginLinks: ["*"],
        onlyCover: false,
        topMargin: 90,
        formatUpdated: "{MM}/{DD} {HH}:{mm}",
        search: {
          maxAge: 86400000,
          paths: "auto",
          placeholder: "点击搜索一下",
          noData: "找不到结果",
          depth: 5,
        },
        pagination: {
          previousText: "上一章节",
          nextText: "下一章节",
          crossChapter: true,
          crossChapterText: true,
        },
        auth: {
          enable: true,
          use: "sha256",
          password:
            "5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8",
          title: "请输入密码以访问文档：",
          paths: ["/others"],
        },
        plugins: [
          function (hook, vm) {
            const UPDATED_MAP_URL = "/static/last-updated.json";
            let updatedMapPromise = null;

            function fetchUpdatedMap() {
              if (!updatedMapPromise) {
                updatedMapPromise = fetch(UPDATED_MAP_URL, {
                  cache: "no-cache",
                })
                  .then((res) => (res.ok ? res.json() : {}))
                  .catch(() => ({}));
              }
              return updatedMapPromise;
            }

            function pad2(n) {
              return String(n).padStart(2, "0");
            }

            function formatUnixTimestamp(unixSeconds) {
              const date = new Date(Number(unixSeconds) * 1000);
              if (Number.isNaN(date.getTime())) return "";
              return `${date.getFullYear()}/${pad2(date.getMonth() + 1)}/${pad2(date.getDate())}`;
            }

            function renderUpdatedLabel(text) {
              const section = document.querySelector(".markdown-section");
              if (!section) return;
              const old = section.querySelector("#docs-last-updated");
              if (old) old.remove();

              const label = document.createElement("blockquote");
              label.id = "docs-last-updated";
              label.textContent = text;
              section.prepend(label);
            }

            hook.doneEach(async function () {
              const routeFile = vm.route.file;
              if (!routeFile || !routeFile.endsWith(".md")) return;

              const updatedMap = await fetchUpdatedMap();
              const unixSeconds = updatedMap[routeFile];
              if (!unixSeconds) return;

              const dateText = formatUnixTimestamp(unixSeconds);
              if (!dateText) return;
              renderUpdatedLabel(`最新更新时间: ${dateText}`);
            });
          },
        ],
        breadcrumb: {
          showHome: true,
          homeText: "Home",
          separator: " &rsaquo; ",
          casing: "capitalize",
          linkColor: "var(--theme-color, #42b983)",
          size: "small",
        },
        pseudocode: {
          indentSize: "1.2em",
          commentDelimiter: "//",
          lineNumber: false,
          lineNumberPunc: ":",
          noEnd: false,
          titlePrefix: "Algorithm",
        },
        footer: {
          copy: `
            <div class="footer-grid">
              <div>
                <h4>📚 Documentation</h4>
                <a href="#/">Home</a><br>
                <a href="#/guide">Guide</a><br>
                <a href="#/api">API Reference</a>
              </div>
              <div>
                <h4>🚀 Project</h4>
                <a href="https://github.com/yourrepo" target="_blank">GitHub</a><br>
                <a href="#/changelog">Changelog</a><br>
                <a href="#/roadmap">Roadmap</a>
              </div>
              <div>
                <h4>💬 Community</h4>
                <a href="#">Discussions</a><br>
                <a href="#">Issues</a><br>
                <a href="#">Contact</a>
              </div>
              <div>
                <h4>⚙️ Built With</h4>
                Docsify<br>
                Markdown<br>
                Open Source ❤️
              </div>
            </div>
            <div class="footer-bottom">
              © 2026 Your Project · Built with Docsify
            </div>
          `,
          auth: "",
          pre: "<hr/>",
          style: "",
          class: "docsify-footer-enhanced",
        },
      };
    </script>

    <!-- Required -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>

    <!-- Recommended -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
    <script src="https://unpkg.com/docsify-copy-code@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/marked@4"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-katex@latest/dist/docsify-katex.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-sha256@0.9.0/build/sha256.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-auth@1.2.0/dist/docsify-auth.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-footnote/dist/docsify-footnote.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-breadcrumb@latest/dist/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/Sumsung524/docsify-backTop/dist/docsify-backTop.min.js"></script>
    <script>
      docsifyBackTop = {
        size: 64,
        bottom: 30,
        right: 30,
        logo: '<svg t="1775643211259" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="7424" width="200" height="200"><path d="M510.293333 513.706667m-469.333333 0a469.333333 469.333333 0 1 0 938.666667 0 469.333333 469.333333 0 1 0-938.666667 0Z" fill="#52C41A" p-id="7425"></path><path d="M725.333333 575.146667l-188.16-188.586667a36.693333 36.693333 0 0 0-50.773333 0L298.666667 575.146667a35.84 35.84 0 0 0 50.773333 50.773333l125.44-125.44v348.586667a35.84 35.84 0 0 0 71.68 0v-352.426667l128 128A35.84 35.84 0 0 0 725.333333 575.146667zM746.666667 302.933333h-469.333334a35.84 35.84 0 0 1 0-71.68h469.333334a35.84 35.84 0 0 1 0 71.68z" fill="#FFFFFF" p-id="7426"></path></svg>',
        bgColor: "",
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/pseudocode@latest/build/pseudocode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/h-hg/docsify-pseudocode/dist/docsify-pseudocode.min.js"></script>
    <script src="//unpkg.com/docsify-footer-enh/dist/docsify-footer-enh.min.js"></script>
  </body>
</html>
