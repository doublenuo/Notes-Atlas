  <body>
    <div id="app"></div>

    <script>
      window.$docsify = {
        repo: "doublenuo/Notes-Atlas",
        name: "Notes-Atlas",
        nameLink: "/",
        loadSidebar: true,
        loadNavbar: "_navbar.md",
        coverpage: "cover.md",
        homepage: "README.md",
        notFoundPage: "404.md",
        alias: {
          "/.*/sidebar.md": "/sidebar.md",
        },
        auto2top: true,
        maxLevel: 4,
        subMaxLevel: 3,
        mergeNavbar: true,
        externalLinkRel: "_blank",
        routerMode: "history",
        crossOriginLinks: ["*"],
        onlyCover: false,
        topMargin: 90,
        formatUpdated: "{MM}/{DD} {HH}:{mm}",
        search: {
          maxAge: 86400000,
          paths: "auto",
          placeholder: "点击搜索一下",
          noData: "找不到结果",
          depth: 5,
        },
        pagination: {
          previousText: "上一章节",
          nextText: "下一章节",
          crossChapter: true,
          crossChapterText: true,
        },
        auth: {
          enable: true,
          use: "sha256",
          password:
            "5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8",
          title: "请输入密码以访问文档：",
          paths: ["/others"],
        },
        plugins: [
          function (hook, vm) {
            const UPDATED_MAP_URL = "/static/last-updated.json";
            let updatedMapPromise = null;

            function fetchUpdatedMap() {
              if (!updatedMapPromise) {
                updatedMapPromise = fetch(UPDATED_MAP_URL, {
                  cache: "no-cache",
                })
                  .then((res) => (res.ok ? res.json() : {}))
                  .catch(() => ({}));
              }
              return updatedMapPromise;
            }

            function pad2(n) {
              return String(n).padStart(2, "0");
            }

            function formatUnixTimestamp(unixSeconds) {
              const date = new Date(Number(unixSeconds) * 1000);
              if (Number.isNaN(date.getTime())) return "";
              return `${date.getFullYear()}/${pad2(date.getMonth() + 1)}/${pad2(date.getDate())}`;
            }

            function renderUpdatedLabel(text) {
              const section = document.querySelector(".markdown-section");
              if (!section) return;
              const old = section.querySelector("#docs-last-updated");
              if (old) old.remove();

              const label = document.createElement("blockquote");
              label.id = "docs-last-updated";
              label.textContent = text;
              section.prepend(label);
            }

            function clearUpdatedLabel() {
              const section = document.querySelector(".markdown-section");
              if (!section) return;
              const old = section.querySelector("#docs-last-updated");
              if (old) old.remove();
            }

            function getExportBaseName() {
              const routePath = (vm.route && vm.route.path) || "";
              const normalized = routePath
                .replace(/^\/+/, "")
                .replace(/\/+$/, "");
              const base = normalized || "README";
              return base
                .replace(/[\\/:*?"<>|#%{}]+/g, "-")
                .replace(/-+/g, "-");
            }

            function makeHtmlDocument(title, bodyHtml) {
              const styles = Array.from(
                document.querySelectorAll('link[rel="stylesheet"]')
              )
                .map((link) => {
                  const href = link.href || link.getAttribute("href");
                  return href ? `<link rel="stylesheet" href="${href}">` : "";
                })
                .join("");

              return `<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>${title}</title>
    ${styles}
  </head>
  <body>
    <main class="markdown-section">${bodyHtml}</main>
  </body>
</html>`;
            }

            function downloadBlob(content, filename, type) {
              const blob = new Blob([content], { type });
              const link = document.createElement("a");
              link.href = URL.createObjectURL(blob);
              link.download = filename;
              document.body.appendChild(link);
              link.click();
              URL.revokeObjectURL(link.href);
              link.remove();
            }

            function setExportLoading(loading) {
              const controls = document.querySelector("#docs-export-controls");
              if (!controls) return;
              controls.classList.toggle("is-loading", loading);
              if (loading) {
                const dropdown = controls.querySelector(".docs-export-dropdown");
                if (dropdown) dropdown.removeAttribute("open");
              }
              controls
                .querySelectorAll("button")
                .forEach((button) => (button.disabled = loading));
            }

            function buildPdfRenderContainer(section) {
              const sectionWidth = Math.max(section.clientWidth, 800);
              const wrapper = document.createElement("div");
              wrapper.style.position = "fixed";
              wrapper.style.left = "-100000px";
              wrapper.style.top = "0";
              wrapper.style.width = `${sectionWidth}px`;
              wrapper.style.padding = "0";
              wrapper.style.margin = "0";
              wrapper.style.background = "#ffffff";
              wrapper.style.zIndex = "-1";

              const clone = section.cloneNode(true);
              clone.style.width = `${sectionWidth}px`;
              clone.style.maxWidth = "none";
              clone.style.margin = "0";
              clone.style.paddingTop = "0";
              clone.style.transform = "none";
              clone.style.position = "static";

              const controlsNode = clone.querySelector("#docs-export-controls");
              if (controlsNode) controlsNode.remove();

              wrapper.appendChild(clone);
              document.body.appendChild(wrapper);
              return { wrapper, clone, sectionWidth };
            }

            async function waitForRenderAssets(root) {
              const images = Array.from(root.querySelectorAll("img"));
              const imageTasks = images.map((img) => {
                if (img.complete && img.naturalWidth > 0) return Promise.resolve();
                return new Promise((resolve) => {
                  img.addEventListener("load", resolve, { once: true });
                  img.addEventListener("error", resolve, { once: true });
                });
              });

              const fontTask =
                document.fonts && document.fonts.ready
                  ? document.fonts.ready
                  : Promise.resolve();

              await Promise.all([fontTask, ...imageTasks]);
            }

            async function exportCurrentPdf(baseName) {
              const section = document.querySelector(".markdown-section");
              if (!section) return;

              if (!window.html2canvas || !window.jspdf || !window.jspdf.jsPDF) {
                alert("PDF 导出依赖未加载完成，请稍后重试。");
                return;
              }

              setExportLoading(true);
              let wrapper = null;
              try {
                const renderTarget = buildPdfRenderContainer(section);
                wrapper = renderTarget.wrapper;
                await waitForRenderAssets(renderTarget.clone);

                const pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
                const canvas = await window.html2canvas(renderTarget.clone, {
                  scale: pixelRatio,
                  useCORS: true,
                  backgroundColor: "#ffffff",
                  width: renderTarget.sectionWidth,
                  windowWidth: renderTarget.sectionWidth,
                  scrollX: 0,
                  scrollY: 0,
                });

                const pdf = new window.jspdf.jsPDF("p", "pt", "a4");
                const pageWidth = pdf.internal.pageSize.getWidth();
                const pageHeight = pdf.internal.pageSize.getHeight();
                const margin = 24;
                const imageWidth = pageWidth - margin * 2;
                const imageHeight = (canvas.height * imageWidth) / canvas.width;
                const pageBodyHeight = pageHeight - margin * 2;
                const imageData = canvas.toDataURL("image/png");
                let leftHeight = imageHeight;
                let offsetY = margin;

                pdf.addImage(
                  imageData,
                  "PNG",
                  margin,
                  offsetY,
                  imageWidth,
                  imageHeight
                );
                leftHeight -= pageBodyHeight;

                while (leftHeight > 0) {
                  pdf.addPage();
                  offsetY = margin - (imageHeight - leftHeight);
                  pdf.addImage(
                    imageData,
                    "PNG",
                    margin,
                    offsetY,
                    imageWidth,
                    imageHeight
                  );
                  leftHeight -= pageBodyHeight;
                }

                pdf.save(`${baseName}.pdf`);
              } finally {
                if (wrapper) wrapper.remove();
                setExportLoading(false);
              }
            }

            function renderExportControls() {
              const section = document.querySelector(".markdown-section");
              if (!section) return;

              const old = section.querySelector("#docs-export-controls");
              if (old) old.remove();

              const controls = document.createElement("div");
              controls.id = "docs-export-controls";
              controls.className = "docs-export-controls";

              const dropdown = document.createElement("details");
              dropdown.className = "docs-export-dropdown";

              const trigger = document.createElement("summary");
              trigger.className = "docs-export-trigger";
              trigger.textContent = "导出";

              const menu = document.createElement("div");
              menu.className = "docs-export-menu";

              const exportPdfButton = document.createElement("button");
              exportPdfButton.type = "button";
              exportPdfButton.className = "docs-export-menu-item";
              exportPdfButton.textContent = "导出为 PDF";

              const exportHtmlButton = document.createElement("button");
              exportHtmlButton.type = "button";
              exportHtmlButton.className = "docs-export-menu-item";
              exportHtmlButton.textContent = "导出为 HTML";

              exportPdfButton.addEventListener("click", async () => {
                dropdown.removeAttribute("open");
                await exportCurrentPdf(getExportBaseName());
              });

              exportHtmlButton.addEventListener("click", () => {
                const currentSection = document.querySelector(".markdown-section");
                if (!currentSection) return;
                dropdown.removeAttribute("open");
                const contentNode = currentSection.cloneNode(true);
                const controlsNode = contentNode.querySelector(
                  "#docs-export-controls"
                );
                if (controlsNode) controlsNode.remove();
                const baseName = getExportBaseName();
                const html = makeHtmlDocument(
                  document.title || "Notes-Atlas",
                  contentNode.innerHTML
                );
                downloadBlob(html, `${baseName}.html`, "text/html;charset=utf-8");
              });

              menu.appendChild(exportPdfButton);
              menu.appendChild(exportHtmlButton);
              dropdown.appendChild(trigger);
              dropdown.appendChild(menu);
              controls.appendChild(dropdown);
              section.prepend(controls);
            }

            hook.doneEach(async function () {
              const routeFile = vm.route.file;
              if (!routeFile || !routeFile.endsWith(".md")) return;
              clearUpdatedLabel();

              const updatedMap = await fetchUpdatedMap();
              const unixSeconds = updatedMap[routeFile];
              if (unixSeconds) {
                const dateText = formatUnixTimestamp(unixSeconds);
                if (dateText) {
                  renderUpdatedLabel(`最新更新时间: ${dateText}`);
                }
              }
              renderExportControls();
            });
          },
        ],
        breadcrumb: {
          showHome: true,
          homeText: "Home",
          separator: " &rsaquo; ",
          casing: "capitalize",
          linkColor: "var(--theme-color, #42b983)",
          size: "small",
        },
        pseudocode: {
          indentSize: "1.2em",
          commentDelimiter: "//",
          lineNumber: false,
          lineNumberPunc: ":",
          noEnd: false,
          titlePrefix: "Algorithm",
        },
        footer: {
          copy: `
            <div class="footer-grid">
              <div>
                <h4>📚 Documentation</h4>
                <a href="#/">Home</a><br>
                <a href="#/guide">Guide</a><br>
                <a href="#/api">API Reference</a>
              </div>
              <div>
                <h4>🚀 Project</h4>
                <a href="https://github.com/yourrepo" target="_blank">GitHub</a><br>
                <a href="#/changelog">Changelog</a><br>
                <a href="#/roadmap">Roadmap</a>
              </div>
              <div>
                <h4>💬 Community</h4>
                <a href="#">Discussions</a><br>
                <a href="#">Issues</a><br>
                <a href="#">Contact</a>
              </div>
              <div>
                <h4>⚙️ Built With</h4>
                Docsify<br>
                Markdown<br>
                Open Source ❤️
              </div>
            </div>
            <div class="footer-bottom">
              © 2026 Your Project · Built with Docsify
            </div>
          `,
          auth: "",
          pre: "<hr/>",
          style: "",
          class: "docsify-footer-enhanced",
        },
      };
    </script>
